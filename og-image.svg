<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Contrast Topology — 3D WCAG contrast visualizer over a color wheel">
  <defs>
    <linearGradient id="bgFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161920"/>
      <stop offset="100%" stop-color="#111318"/>
    </linearGradient>

    <conicGradient id="hueWheel" cx="50%" cy="50%" gradientTransform="rotate(-90 600 470)">
      <stop offset="0%" stop-color="#ff4d4d"/>
      <stop offset="16.67%" stop-color="#ffd24d"/>
      <stop offset="33.33%" stop-color="#5dff7a"/>
      <stop offset="50%" stop-color="#4de8ff"/>
      <stop offset="66.67%" stop-color="#5d7aff"/>
      <stop offset="83.33%" stop-color="#c45dff"/>
      <stop offset="100%" stop-color="#ff4d4d"/>
    </conicGradient>

    <radialGradient id="wheelShade" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#808080"/>
      <stop offset="35%" stop-color="#808080" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="wire" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.35"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bgFade)"/>

  <text x="600" y="108" text-anchor="middle" fill="#e8eaed" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="650" letter-spacing="-0.02em">Contrast Topology</text>
  <text x="600" y="162" text-anchor="middle" fill="#aeb4c0" font-family="system-ui, -apple-system, sans-serif" font-size="28">3D WCAG contrast ratio visualizer</text>

  <g transform="translate(0, 18)">
    <!-- Color wheel base -->
    <ellipse cx="600" cy="470" rx="318" ry="102" fill="url(#hueWheel)"/>
    <ellipse cx="600" cy="470" rx="318" ry="102" fill="url(#wheelShade)"/>
    <ellipse cx="600" cy="470" rx="318" ry="102" fill="none" stroke="#3a4150" stroke-width="2"/>

    <!-- Mountain surface slices (hue by angle, height = contrast) -->
    <g filter="url(#glow)">
      <polygon points="600,418 330,468 350,404 470,292" fill="#e8c84a" opacity="0.95"/>
      <polygon points="600,418 350,404 470,292 560,318" fill="#b8e84a" opacity="0.95"/>
      <polygon points="600,418 470,292 560,318 600,338" fill="#6ee87a" opacity="0.95"/>
      <polygon points="600,418 560,318 600,338 640,352" fill="#4de8c8" opacity="0.95"/>
      <polygon points="600,418 600,338 640,352 680,330" fill="#4db8ff" opacity="0.95"/>
      <polygon points="600,418 640,352 680,330 730,286" fill="#5d7aff" opacity="0.95"/>
      <polygon points="600,418 680,330 730,286 790,318" fill="#7a5dff" opacity="0.95"/>
      <polygon points="600,418 730,286 790,318 850,368" fill="#b85dff" opacity="0.95"/>
      <polygon points="600,418 790,318 850,368 870,468" fill="#ff5d8a" opacity="0.95"/>
      <polygon points="600,418 850,368 870,468 330,468" fill="#ff6d4d" opacity="0.95"/>
    </g>

    <!-- Wireframe ridges -->
    <g fill="none" stroke="url(#wire)" stroke-width="1.2" stroke-linejoin="round">
      <path d="M330,468 L350,404 L470,292 L560,318 L600,338 L640,352 L680,330 L730,286 L790,318 L850,368 L870,468"/>
      <path d="M600,418 L470,292"/>
      <path d="M600,418 L600,338"/>
      <path d="M600,418 L730,286"/>
      <path d="M600,418 L850,368"/>
      <path d="M600,418 L350,404"/>
      <path d="M350,404 L680,330"/>
      <path d="M470,292 L790,318"/>
      <path d="M560,318 L850,368"/>
      <path d="M330,468 L600,418 L870,468"/>
    </g>

    <!-- Peak markers -->
    <g>
      <line x1="470" y1="292" x2="470" y2="258" stroke="#ffffff" stroke-width="2" opacity="0.9"/>
      <circle cx="470" cy="250" r="11" fill="#fff4d6" stroke="#ffffff" stroke-width="2"/>
      <line x1="730" y1="286" x2="730" y2="252" stroke="#ffffff" stroke-width="2" opacity="0.9"/>
      <circle cx="730" cy="244" r="11" fill="#fff4d6" stroke="#ffffff" stroke-width="2"/>
    </g>
  </g>

  <text x="600" y="598" text-anchor="middle" fill="#8f98a8" font-family="system-ui, -apple-system, sans-serif" font-size="22">Hue × saturation color wheel · height = contrast to reference</text>
</svg>
